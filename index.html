<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournoi Volley Live</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">CSM Volley</p>
      <h1>🏐 Tournoi Live</h1>
      <p class="small" id="subtitle">Chargement...</p>
    </div>
    <div class="live-pill">LIVE</div>
  </header>

  <div class="grid nav-grid">
    <button onclick="show('teams')">Voir mes matchs</button>
    <button onclick="show('planning')">Planning</button>
    <button onclick="show('standings')">Classements</button>
    <button onclick="show('score')">Saisie terrain</button>
    <button onclick="show('brackets')">Tableaux</button>
    <button onclick="show('admin')">Admin</button>
  </div>

  <div id="teams" class="section hidden">
    <h2>Voir mes matchs</h2>
    <select id="teamSelect"></select>
    <div id="teamMatches"></div>
  </div>

  <div id="planning" class="section hidden">
    <h2>Planning</h2>
    <select id="phaseFilter" onchange="renderPlanning()">
      <option value="">Toutes les phases</option>
      <option value="Brassage 1">Brassage 1</option>
      <option value="Brassage 2">Brassage 2</option>
      <option value="Tableau principal">Tableau principal</option>
      <option value="Consolante">Consolante</option>
    </select>
    <select id="courtFilter" onchange="renderPlanning()">
      <option value="">Tous les terrains</option>
      <option value="1">Terrain 1</option>
      <option value="2">Terrain 2</option>
      <option value="3">Terrain 3</option>
      <option value="4">Terrain 4</option>
      <option value="5">Terrain 5</option>
      <option value="6">Terrain 6</option>
    </select>
    <div id="planningView"></div>
  </div>

  <div id="standings" class="section hidden">
    <h2>Classements</h2>
    <div id="standingsView"></div>
  </div>

  <div id="brackets" class="section hidden">
    <h2>Tableaux</h2>
    <div id="globalRankingView"></div>
    <div id="bracketsView"></div>
  </div>

  <div id="score" class="section hidden">
    <h2>Saisie terrain</h2>
    <input id="courtCode" placeholder="Code terrain : T1 à T6" />
    <button onclick="loadCourt()">Ouvrir terrain</button>
    <div id="courtView"></div>
  </div>

  <div id="admin" class="section hidden">
    <h2>Admin</h2>
    <input id="adminCode" placeholder="Code admin" type="password" />
    <button onclick="unlockAdmin()">Déverrouiller admin</button>

    <div id="adminPanel" class="hidden">
      <h3>Configuration tournoi</h3>
      <label>Départ tournoi</label>
      <input id="cfgStart" type="time" />
      <label>Durée match brassage (min)</label>
      <input id="cfgDuration" type="number" />
      <label>Pause entre matchs (min)</label>
      <input id="cfgBreak" type="number" />
      <label>Pause entre brassage 1 et 2 (min)</label>
      <input id="cfgRoundBreak" type="number" />
      <label>Nombre de terrains</label>
      <input id="cfgCourts" type="number" />
      <button onclick="saveSettings()">Sauvegarder configuration</button>

      <h3>Actions</h3>
      <button onclick="regenerateBrassage1()">Régénérer brassage 1 avec horaires</button>
      <button onclick="generateBrassage2()">Générer brassage 2</button>
      <button onclick="generateBrackets()">Générer tableaux</button>
      <button class="danger" onclick="resetScores()">Reset tous les scores</button>

      <h3>Équipes</h3>
      <p class="small">Tu pourras remplacer les noms la veille ici, sans toucher au code.</p>
      <div id="teamsAdmin"></div>
      <button onclick="saveTeams()">Sauvegarder noms équipes</button>
    </div>

    <div id="adminMsg" class="card"></div>
  </div>

  <script>
    window.SUPABASE_URL = "https://oqabkmiwpefhitwwzrqk.supabase.co";
    window.SUPABASE_KEY = "sb_publishable_OAwnRz5aJVgL_JbVJSctXg__CuQ1kvN";
  </script>
  <script src="script.js"></script>
</body>
</html>
